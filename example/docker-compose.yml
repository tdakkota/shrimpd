services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    environment:
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_DATA_DIR=/etcd-data
    volumes:
      - ./nodes/etcd:/etcd-data
    ports:
      - "2379:2379"
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1024M
  gateway:
    build: ..
    image: tdakkota/shrimpd:latest
    entrypoint: [ "/shrimpgateway" ]
    command:
      - -addr=:8080
      - -upstreams=http://shrimpd-1:8080,http://shrimpd-2:8080,http://shrimpd-3:8080
    ports:
      - "8080:8080"
    depends_on:
      shrimpd-1:
        condition: service_started
      shrimpd-2:
        condition: service_started
      shrimpd-3:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
  shrimpd-1:
    build: ..
    image: tdakkota/shrimpd:latest
    environment:
      - OTEL_LOGS_EXPORTER=none
    command:
      - -id=shrimpd-1
      - -addr=shrimpd-1:8080
      - -data=/data
      - -etcd=etcd:2379
      - -pprof=:6060
      - -memlimit=800MiB # 800 MiB — triggers aggressive GC before cgroup kills
      - -memprofile-dir=/profiles
      - -memprofile-threshold=500MiB # dump at 500 MiB heap_inuse
    expose:
      - "8080"
    ports:
      - "127.0.0.1:6061:6060"
    volumes:
      - ./nodes/node-1:/data
      - ./profiles/node-1:/profiles
    depends_on:
      etcd:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
  shrimpd-2:
    build: ..
    image: tdakkota/shrimpd:latest
    environment:
      - OTEL_LOGS_EXPORTER=none
    command:
      - -id=shrimpd-2
      - -addr=shrimpd-2:8080
      - -data=/data
      - -etcd=etcd:2379
      - -pprof=:6060
      - -memlimit=800MiB # 800 MiB — triggers aggressive GC before cgroup kills
      - -memprofile-dir=/profiles
      - -memprofile-threshold=500MiB # dump at 500 MiB heap_inuse
    expose:
      - "8080"
    ports:
      - "127.0.0.1:6062:6060"
    volumes:
      - ./nodes/node-2:/data
      - ./profiles/node-2:/profiles
    depends_on:
      etcd:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
  shrimpd-3:
    build: ..
    image: tdakkota/shrimpd:latest
    environment:
      - OTEL_LOGS_EXPORTER=none
    command:
      - -id=shrimpd-3
      - -addr=shrimpd-3:8080
      - -data=/data
      - -etcd=etcd:2379
      - -pprof=:6060
      - -memlimit=800MiB # 800 MiB — triggers aggressive GC before cgroup kills
      - -memprofile-dir=/profiles
      - -memprofile-threshold=500MiB # dump at 500 MiB heap_inuse
    expose:
      - "8080"
    ports:
      - "127.0.0.1:6063:6060"
    volumes:
      - ./nodes/node-3:/data
      - ./profiles/node-3:/profiles
    depends_on:
      etcd:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
